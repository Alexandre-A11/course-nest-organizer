# Course Vault — single-container deployment.
# Serves the web app (frontend) AND the LAN sync + streaming server from one
# image on port 8787.
#
# Usage:
#   1. Put your course folders inside ./courses/  (one folder per course;
#      subfolders are scanned recursively).
#   2. From the REPO ROOT (not this folder), or using the -f flag below:
#        docker compose -f server/docker-compose.yml up -d --build
#   3. Open http://<this-machine-LAN-IP>:8787 in any browser on your network.
#      No separate frontend deploy needed — the same URL serves the app.
services:
  course-vault:
    build:
      context: ..              # repo root, so the frontend sources are visible
      dockerfile: server/Dockerfile
    image: course-vault:latest
    container_name: course-vault
    restart: unless-stopped
    ports:
      - "8787:8787"
    volumes:
      - ./data:/data           # SQLite database (sync metadata)
      - ./courses:/courses     # Your course folders
    environment:
      PORT: 8787