# Course Vault — single-container deployment running TWO servers in one image:
#   - Frontend (Vite preview)        → http://<LAN-IP>:4173
#   - Backend  (Express API/stream)  → http://<LAN-IP>:8787
#
# Usage:
#   1. Put your course folders inside ./courses/.
#   2. docker compose -f server/docker-compose.yml up -d --build
#   3. Open http://<this-machine-LAN-IP>:4173 in any browser on your network.
#      In Server Settings, point the app at  http://<this-machine-LAN-IP>:8787
services:
  course-vault:
    build:
      context: ..              # repo root — frontend sources must be visible
      dockerfile: server/Dockerfile
    image: course-vault:latest
    container_name: course-vault
    restart: unless-stopped
    ports:
      - "4173:4173"            # frontend (Vite preview)
      - "8787:8787"
    volumes:
      - ./data:/data           # SQLite database (sync metadata)
      - ./courses:/courses     # Your course folders
    environment:
      PORT: 8787